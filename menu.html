<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Café De Lumière</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!--Navigation bar-->

    <nav class="desktop-navbar mobile-navbar" id="mobile-navbar">
      <div class="logo">
        <img src="images/coffee-shop-logo.png" alt="Coffee shop logo" />
      </div>
      <a class="menu-icon" onclick="hamburger()"><div>&#9776;</div></a>

      <ul class="navbar-links" id="navbar-links">
        <li>
          <a href="index.html">Home</a>
        </li>
        <li>
          <a href="#menu">Menu</a>
        </li>
        <li>
          <a href="index.html#rewards">Rewards</a>
        </li>
        <li>
          <a href="contact.html">Contact</a>
        </li>
        <li>
          <a href="orderTracker.html" class="orderTrackerBtn">Track Order</a>
        </li>
      </ul>
    </nav>

    <section class="panel panel5">
      <div>
        <div class="filter-bar">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="coffee">Coffee</button>
          <button class="filter-btn" data-filter="tea">Tea</button>
          <button class="filter-btn" data-filter="fresh-drinks">
            Fresh Drinks
          </button>
          <button class="filter-btn" data-filter="desserts">Desserts</button>
          <button class="filter-btn" data-filter="frappe">Frappe</button>
          <button class="filter-btn" data-filter="snacks">Snacks</button>
        </div>
        <div class="search-container">
          <input type="text" id="menu-search" placeholder="Search menu..." />
          <select id="menu-sort">
            <option value="default">sort: Default</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="name-asc">name: A &rarr; Z</option>
          </select>
        </div>

        <div>
          <!--this is a table for menu items-->
          <table class="table-menu table-menu2" id="tea">
            <thead>
              <th>item</th>

              <th>Price</th>
            </thead>
            <tbody id="menu-tbody">
              <!--Use Javascript to fill this menu-->
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <footer>
      <div class="container-footer">
        <p>© Copyright 2021. All Rights Reserved.</p>
        <p>
          <a href="mailto:cafedelumiere@gmail.com">cafedelumiere@gmail.com</a>
        </p>

        <div class="social-logo">
          <a href="https://www.facebook.com/cafedelumiere" target="_blank"
            ><img
              src="images/facebook-logo.png"
              alt="black and white Facebook logo"
              class="pr-4"
          /></a>

          <a href="https://twitter.com/cafedelumiere" target="_blank"
            ><img
              src="images/twitter-logo.png"
              alt="black and white Twitter logo"
          /></a>
        </div>
      </div>
    </footer>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="scripts/script.js"></script>
    <script src="scripts/script5_chapter5_and_6_events.js"></script>
    <!--<script
      src = "scripts/script_7_8_jquery.js"></script>
    </script> -->
    <script src="scripts/script_chapter_12.js"></script>
  </body>
</html>
